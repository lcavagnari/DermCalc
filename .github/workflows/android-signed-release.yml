name: Android Signed Release

on:
  workflow_call:
    secrets:
      ANDROID_SIGNING_KEYSTORE_BASE64:
        required: true
      ANDROID_SIGNING_KEYSTORE_PASSWORD:
        required: true
      ANDROID_SIGNING_KEY_ALIAS:
        required: true
      ANDROID_SIGNING_KEY_PASSWORD:
        required: true

jobs:
  signed-release:
    name: Build signed release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Decode signing keystore
        env:
          ANDROID_SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          printf '%s' "$ANDROID_SIGNING_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/dermcalc-release.jks"

      - name: Build signed release APK
        env:
          ANDROID_SIGNING_KEYSTORE_PATH: ${{ runner.temp }}/signing/dermcalc-release.jks
          ANDROID_SIGNING_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEYSTORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Upload signed release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Publish APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dermcalc-${{ github.run_id }}
          name: DermCalc ${{ github.run_number }}
          body: |
            Automated DermCalc APK release from `${{ github.workflow }}` run #${{ github.run_number }}.

            Add the self-signed release keystore as repository secrets:
            - `ANDROID_SIGNING_KEYSTORE_BASE64`: base64-encoded JKS/keystore file
            - `ANDROID_SIGNING_KEYSTORE_PASSWORD`: keystore password
            - `ANDROID_SIGNING_KEY_ALIAS`: key alias
            - `ANDROID_SIGNING_KEY_PASSWORD`: key password
          files: app/build/outputs/apk/release/*.apk
