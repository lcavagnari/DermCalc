name: Android Signed Release

on:
  workflow_call:
    secrets:
      ANDROID_SIGNING_KEYSTORE_BASE64:
        required: true
      ANDROID_SIGNING_KEYSTORE_PASSWORD:
        required: true
      ANDROID_SIGNING_KEY_ALIAS:
        required: true
      ANDROID_SIGNING_KEY_PASSWORD:
        required: true

jobs:
  signed-release:
    name: Build signed release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Decode signing keystore
        env:
          ANDROID_SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          printf '%s' "$ANDROID_SIGNING_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/dermcalc-release.jks"

      - name: Build signed release APK
        env:
          ANDROID_SIGNING_KEYSTORE_PATH: ${{ runner.temp }}/signing/dermcalc-release.jks
          ANDROID_SIGNING_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEYSTORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Verify APK is signed
        run: |
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          if [[ -z "$BUILD_TOOLS" ]]; then echo "No build-tools found in $ANDROID_HOME/build-tools"; exit 1; fi
          APK=$(find app/build/outputs/apk/release -name "*.apk" | grep -v unsigned | head -1)
          if [[ -z "$APK" ]]; then echo "No signed APK found (only unsigned output present)"; exit 1; fi
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" verify --verbose "$APK"
          echo "APK signature verified: $APK"

      - name: Upload signed release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Publish APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: DermCalc v${{ steps.version.outputs.version }} (build ${{ github.run_number }})
          body: |
            Automated release of DermCalc v${{ steps.version.outputs.version }}, build #${{ github.run_number }}.

            Commit: ${{ github.sha }}
          files: app/build/outputs/apk/release/*.apk
